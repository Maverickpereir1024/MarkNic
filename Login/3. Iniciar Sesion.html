<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InicioSesion - MarkNic</title>

    <link rel="stylesheet" href="3. style-iniciarses.css">
</head>
<body>
    <div class="login-card">
        <h2 class="login-title">INICIO DE SESIÓN PARA CANDIDATOS</h2>
        
        <p class="register-link">¿No tienes una cuenta aún? <a href="#">Regístrate hoy</a></p>

        <form id="loginForm" class="login-form">
            <div class="input-wrapper">
                <input type="email" id="userEmail" placeholder="Correo electrónico" required>
            </div>

            <div class="input-wrapper">
                <input type="password" id="userPass" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="btn-login-submit" id="btnLogin">
                INICIO CANDIDATOS
            </button>
        </form>

        <div class="login-footer">
            <a href="#" class="forgot-pass">¿Olvidaste la contraseña?</a>
        </div>
    </div>

</body>
</html>
