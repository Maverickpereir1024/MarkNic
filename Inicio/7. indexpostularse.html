<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Vacante | MarkNic</title>
    <link rel="stylesheet" href="5. Styleoferts.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --travel-blue:   #0077B6;
            --travel-sky:    #00B4D8;
            --travel-coral:  #6366f1;
            --travel-sand:   #F5E6D3;
            --travel-dark:   #0f172a;
            --travel-light:  #F0F8FF;
            --travel-success:#0CAA56;
            --nav-height:    65px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--travel-dark);
            color: #1e293b;
            padding-bottom: calc(var(--nav-height) + 10px);
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--travel-dark), #0077B6cc);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(0,180,216,0.2);
        }
        .topbar .btn-back {
            background: rgba(255,255,255,0.1); color: white; border: none;
            width: 38px; height: 38px; border-radius: 10px;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .topbar .btn-back:hover { background: rgba(255,255,255,0.2); }
        .topbar h2 {
            color: white; font-size: 1rem; font-weight: 700;
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* CONTENIDO PRINCIPAL */
        .modal-postulacion {
            max-width: 600px; width: 100%;
            margin: 0 auto;
            padding: 0px;
        }

        .detalle-principal {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(3,4,94,0.2);
        }

        /* Hero titular */
        .detalle-hero {
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--travel-dark), var(--travel-blue));
            padding: 24px 20px 20px;
            color: white;
            border-radius: 20px 20px 0 0;
        }
        #titulo-vacante {
            font-size: 1.35rem; font-weight: 800;
            color: white !important; margin-bottom: 6px;
            line-height: 1.3;
        }
        .empresa-hero {
            display: flex; align-items: center; gap: 8px;
            color: var(--travel-sky); font-size: 0.9rem; font-weight: 600;
        }

        /* Badges de info */
        .header-info-container {
            display: flex; flex-wrap: wrap; gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-badge {
            display: flex; align-items: center; gap: 10px;
            background: var(--travel-light); border-radius: 12px;
            padding: 10px 14px; flex: 1; min-width: 130px;
        }
        .badge-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--travel-blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .badge-icon.badge-purple { background: #7c3aed; }
        .badge-icon.badge-green  { background: var(--travel-success); }
        .badge-text { display: flex; flex-direction: column; }
        .badge-text .label { font-size: 0.7rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-text .value { font-size: 0.88rem; font-weight: 700; color: #1e293b; }

        /* Botones de acción */
        .acciones-rapidas {
            display: flex; gap: 10px; padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .btn-favorito {
            flex: 1; padding: 11px 14px;
            background: transparent; color: var(--travel-blue);
            border: 2px solid var(--travel-blue); border-radius: 12px;
            font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-favorito:hover { background: var(--travel-light); }
        .btn-aplicar-oferta {
            flex: 1.5; padding: 11px 14px;
            background: linear-gradient(135deg, var(--travel-coral));
            color: white; border: none; border-radius: 12px;
            font-weight: 800; font-size: 0.88rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(232,93,39,0.35);
        }
        .btn-aplicar-oferta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,93,39,0.4); }

        /* Descripción y detalles */
        .descripcion-texto {
            padding: 20px;
        }
        .descripcion-texto h3 {
            font-size: 0.75rem; font-weight: 700;
            color: var(--travel-blue) !important;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .descripcion-texto hr { border: none; border-top: 1px solid #e5e7eb; margin-bottom: 16px; }

        .grid-detalles { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .dato {
            background: var(--travel-light); border-radius: 10px; padding: 12px 14px;
        }
        .dato strong { display: block; font-size: 0.72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .dato span { font-size: 0.88rem; color: #374151; }

        .info-bloque {
            background: #f8fafc; border-radius: 12px; padding: 16px;
            margin-bottom: 16px; border-left: 4px solid var(--travel-sky);
        }
        .info-bloque h4 {
            font-size: 0.88rem; color: var(--travel-dark); margin-bottom: 10px;
            display: flex; align-items: center; gap: 7px;
        }
        #descripcion-vacante {
            font-size: 0.88rem; color: #475569; line-height: 1.7;
            white-space: pre-line;
        }

        /* Sidebar empresa */
        .sidebar-empresa {
            background: linear-gradient(135deg, var(--travel-light), #e0f2fe);
            border-radius: 14px; padding: 16px; margin-top: 6px;
        }
        #sidebar-empresa {
            font-size: 1rem; color: var(--travel-dark); margin-bottom: 8px;
        }
        .link-empresa {
            color: var(--travel-blue); font-size: 0.82rem;
            font-weight: 600; text-decoration: none;
        }
        .link-empresa:hover { text-decoration: underline; }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 50%, #e2e8f0 75%);
            background-size: 400% 100%;
            animation: sk 1.4s ease infinite;
            border-radius: 8px; height: 14px; margin-bottom: 8px;
        }
        @keyframes sk { 0%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: linear-gradient(135deg, var(--travel-dark), #012a4a);
            border-top: 1px solid rgba(0,180,216,0.2);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding: 0 4px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 3px; padding: 6px 8px; border-radius: 12px;
            cursor: pointer; transition: 0.25s;
            text-decoration: none; color: rgba(255,255,255,0.45);
            flex: 1; max-width: 75px;
        }
        .nav-item i { font-size: 1.2rem; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; }
        .nav-item:hover { color: var(--travel-sky); }
        .nav-item.nav-logout { color: rgba(232,93,39,0.6); }
        .nav-item.nav-logout:hover { color: var(--travel-coral); }
    </style>
</head>

<body>

    <!-- TOPBAR CON BOTÓN VOLVER -->
    <div class="topbar">
        <button class="btn-back" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h2 id="topbar-titulo">Detalle de Vacante</h2>
    </div>

    <div class="modal-postulacion">
        <main class="detalle-principal">

            <!-- HERO -->
            <div class="detalle-hero">
                <h1 id="titulo-vacante">
                    <span class="skeleton" style="width:70%; height:22px; display:block;"></span>
                </h1>
                <div class="empresa-hero">
                    <i class="fas fa-building"></i>
                    <span id="empresa-hero-text">Cargando...</span>
                </div>
            </div>

            <!-- BADGES -->
            <div class="header-info-container">
                <div class="info-badge">
                    <div class="badge-icon"><i class="fas fa-building"></i></div>
                    <div class="badge-text">
                        <span class="label">Empresa</span>
                        <span id="empresa-vacante" class="value">—</span>
                    </div>
                </div>
                <div class="info-badge">
                    <div class="badge-icon badge-purple"><i class="fas fa-info-circle"></i></div>
                    <div class="badge-text">
                        <span class="label">Estado</span>
                        <span id="estado-vacante" class="value">—</span>
                    </div>
                </div>
                <div class="info-badge">
                    <div class="badge-icon badge-green"><i class="fas fa-money-bill-wave"></i></div>
                    <div class="badge-text">
                        <span class="label">Salario</span>
                        <span id="salario-vacante" class="value">—</span>
                    </div>
                </div>
            </div>

            <!-- ACCIONES -->
            <div class="acciones-rapidas">
                <button class="btn-favorito"><i class="far fa-star"></i> Guardar</button>
                <button class="btn-aplicar-oferta" onclick="abrirModalAplicacion()">
                    <i class="fas fa-paper-plane"></i> Aplicar ahora
                </button>
            </div>

            <!-- DESCRIPCIÓN -->
            <section class="descripcion-texto">
                <h3>Detalles de la Oferta</h3>
                <hr>
                <div class="grid-detalles">
                    <div class="dato">
                        <strong>Experiencia Requerida</strong>
                        <span id="experiencia-vacante">—</span>
                    </div>
                    <div class="dato">
                        <strong>Habilidades Clave</strong>
                        <span id="habilidades-vacante">—</span>
                    </div>
                </div>

                <div class="info-bloque">
                    <h4><i class="fas fa-align-left"></i> Descripción del Puesto</h4>
                    <p id="descripcion-vacante">Cargando descripción...</p>
                </div>

                <div class="sidebar-empresa">
                    <h3 id="sidebar-empresa">—</h3>
                    <div style="margin-top:8px;">
                        <a href="#" class="link-empresa">Ver más empleos de esta empresa →</a>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="1. indexmenu.html" class="nav-item" title="Inicio">
            <i class="fas fa-home"></i><span>Inicio</span>
        </a>
        <a href="1. indexmenu.html#postulaciones" class="nav-item" title="Postulaciones">
            <i class="fas fa-paper-plane"></i><span>Postulaciones</span>
        </a>
        <a href="#perfil" class="nav-item" title="Mi Perfil">
            <i class="fas fa-user-circle"></i><span>Mi Perfil</span>
        </a>
        <a href="#ajustes" class="nav-item" title="Ajustes">
            <i class="fas fa-cog"></i><span>Ajustes</span>
        </a>
        <a href="/index.html" class="nav-item nav-logout" title="Cerrar Sesión">
            <i class="fas fa-sign-out-alt"></i><span>Salir</span>
        </a>
    </nav>

    <script>
        const supabaseUrl = 'https://mrretnaghvkipwggktfp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ycmV0bmFnaHZraXB3Z2drdGZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTA0NDgsImV4cCI6MjA5MTc4NjQ0OH0.UF_bhFFP__31GiiTxy2fsaKVqNjGie6H2LdGuAvZmoc';
        const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams  = new URLSearchParams(window.location.search);
        const idVacante  = urlParams.get('id');

        // =====================================================================
        // FUNCIÓN PARA OBTENER EL MEJOR CAMPO DE NOMBRE DE EMPRESA
        // Prueba múltiples columnas porque la BD puede tener distintos nombres
        // =====================================================================
        function obtenerEmpresa(data) {
            return data.company_name
                || data.employer_name
                || data.company
                || data.empresa
                || data.description_original
                || 'Empresa confidencial';
        }

        function obtenerTitulo(data) {
            return data.title
                || data.job_title
                || data.nombre_puesto
                || 'Vacante disponible';
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value || '—';
        }

        async function cargarDetalleVacante() {
            if (!idVacante) {
                document.getElementById('titulo-vacante').textContent = 'Sin ID de vacante';
                return;
            }

            try {
                const { data, error } = await clienteSupabase
                    .from('job_offer')
                    .select('*')
                    .eq('id', idVacante)
                    .single();

                if (error || !data) {
                    document.getElementById('titulo-vacante').textContent = 'Vacante no encontrada';
                    console.error('Error Supabase:', error);
                    return;
                }

                const empresa = obtenerEmpresa(data);
                const titulo  = obtenerTitulo(data);

                // Título principal y topbar
                document.getElementById('titulo-vacante').textContent = titulo;
                document.getElementById('topbar-titulo').textContent  = titulo;

                // Empresa en hero y badges
                const heroEmp = document.getElementById('empresa-hero-text');
                if (heroEmp) heroEmp.textContent = empresa;

                setText('empresa-vacante',     empresa);
                setText('sidebar-empresa',     empresa);
                setText('estado-vacante',      data.estado || data.status || 'Abierto');
                setText('salario-vacante',     data.salary_range || data.salario || 'A convenir');
                setText('experiencia-vacante', data.experience_years
                    ? data.experience_years + ' año(s)'
                    : data.experiencia || 'Sin experiencia requerida');
                setText('habilidades-vacante', data.skills_required || data.habilidades || 'No especificadas');
                setText('descripcion-vacante', data.responsibilities || data.description || data.descripcion || 'Sin descripción detallada.');

            } catch (err) {
                console.error('Error de red:', err);
                document.getElementById('titulo-vacante').textContent = 'Error de conexión';
            }
        }

        function abrirModalAplicacion() {
            window.location.href = `7. indexpostularse.html?id=${idVacante}`;
        }

        // *** ESTO ES LO QUE FALTABA: llamar a la función al cargar la página ***
        document.addEventListener('DOMContentLoaded', cargarDetalleVacante);
    </script>
</body>
</html>
